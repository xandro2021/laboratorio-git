<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | UCR - IF-4101</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fuentes Google -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Work Sans', sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
        }

        .headline {
            font-family: 'Manrope', sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .btn-login {
            background-color: #00236f;
            color: white;
            font-weight: 700;
            border-radius: 50px;
            padding: 12px 0;
        }

        .btn-login:hover {
            background-color: #001a55;
            transform: translateY(-1px);
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 16px;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center p-4">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">

                <!-- Título superior -->
                <div class="text-center mb-5">
                    <h1 class="headline fw-bold display-5 text-primary mb-2">
                        UCR - IF-4101
                    </h1>
                    <p class="text-muted fw-medium text-uppercase small tracking-widest">
                        Lenguajes de aplicaciones comerciales
                    </p>
                </div>

                <!-- Tarjeta principal -->
                <div class="glass-card rounded-4 p-4 p-md-5">

                    <div class="mb-4">
                        <h2 class="headline fw-bold fs-3 mb-1">Laboratorio 2</h2>
                        <p class="text-muted">Ingresa tus credenciales para continuar</p>
                    </div>

                    <form>
                        <!-- Email / Usuario -->
                        <div class="mb-3">
                            <label class="form-label fw-bold text-uppercase small text-muted">Email o Usuario</label>
                            <input type="text" class="form-control" placeholder="architect@git.io" required>
                        </div>

                        <!-- Contraseña -->
                        <div class="mb-3">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <label class="form-label fw-bold text-uppercase small text-muted">Contraseña</label>
                                <a href="#" class="text-decoration-none small text-primary">¿Olvidaste tu contraseña?</a>
                            </div>
                            <div class="input-group">
                                <input type="password" class="form-control" placeholder="••••••••" required>
                                <button class="btn btn-outline-secondary" type="button">
                                    <span class="material-symbols-outlined">visibility</span>
                                </button>
                            </div>
                        </div>

                        <!-- Recordar -->
                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="remember">
                            <label class="form-check-label text-muted" for="remember">
                                Recordarme por 30 días
                            </label>
                        </div>

                        <!-- Botón Iniciar Sesión -->
                        <button type="submit" class="btn btn-login w-100 mb-4">
                            Iniciar Sesión
                        </button>
                    </form>

                <!-- Footer -->
                <div class="text-center mt-5 text-muted small">
                    <p>© 2024 UCR - IF-4101</p>
                    <div class="d-flex justify-content-center gap-4">
                        <a href="#" class="text-muted text-decoration-none">Privacidad</a>
                        <a href="#" class="text-muted text-decoration-none">Seguridad</a>
                        <a href="#" class="text-muted text-decoration-none">Soporte</a>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
